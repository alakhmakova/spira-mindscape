spring.datasource.url=jdbc:h2:mem:spira-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=false
spring.graphql.graphiql.enabled=false

logging.level.com.spiramindscape=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.springframework=WARN

# Test encryption key (32 bytes base64) — development/test only
ai.encryption.key=c3BpcmEtdGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dCE=
