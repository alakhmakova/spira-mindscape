spring.datasource.url=jdbc:h2:mem:spira-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=false
spring.graphql.graphiql.enabled=false

# GROW book ingestion needs the pgvector book_chunk table (Flyway-only DDL),
# which the H2 test schema doesn't have — keep the runner out of test contexts.
spira.books.enabled=false

# JDBC sessions need the SPRING_SESSION tables (Flyway-only DDL, V14). Tests
# authenticate per request (E2eTestAuthFilter) and don't need sessions at all —
# fall back to plain in-memory servlet sessions.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.session.SessionAutoConfiguration

# Integration tests fire many mutations fast; don't let rate limiting flake them
# (the limiter has its own dedicated unit test, RateLimitFilterTest).
spira.ratelimit.enabled=false

logging.level.com.spiramindscape=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.springframework=WARN

# Test encryption key (32 bytes base64) — development/test only
ai.encryption.key=c3BpcmEtdGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dCE=
