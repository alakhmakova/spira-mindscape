spring.application.name=spira-backend
server.port=${PORT:8080}

# PostgreSQL defaults match backend/docker-compose.yml.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/spira}
spring.datasource.username=${DATABASE_USERNAME:spira}
spring.datasource.password=${DATABASE_PASSWORD:spira}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.graphql.path=/graphql
spring.graphql.graphiql.enabled=false
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Google OAuth2 / OIDC
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Session cookie settings
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true

logging.level.com.spiramindscape=INFO
logging.level.org.springframework=INFO
