spring.application.name=spira-backend
server.port=${PORT:8080}

# PostgreSQL defaults match backend/docker-compose.yml.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/spira}
spring.datasource.username=${DATABASE_USERNAME:spira}
spring.datasource.password=${DATABASE_PASSWORD:spira}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.graphql.path=/graphql
spring.graphql.graphiql.enabled=false
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging.level.com.spiramindscape=INFO
logging.level.org.springframework=INFO

# ── AI ────────────────────────────────────────────────────────────────────────
# AES-256 key (32 bytes) encoded as Base64. Set AI_ENCRYPTION_KEY in env for
# production. The default below is for local development ONLY — never use it
# in production.
ai.encryption.key=${AI_ENCRYPTION_KEY:c3BpcmEtZGV2LW9ubHkta2V5LTMyYnl0ZXMteHl6eiE=}
