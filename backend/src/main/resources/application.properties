spring.application.name=spira-backend
server.port=${PORT:8080}

# PostgreSQL defaults match backend/docker-compose.yml.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/spira}
spring.datasource.username=${DATABASE_USERNAME:spira}
spring.datasource.password=${DATABASE_PASSWORD:spira}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.graphql.path=/graphql
spring.graphql.graphiql.enabled=false
# Dev default also allows LAN origins so a phone/another device on the same
# network can use the Vite dev server (which forwards its Origin header here).
# Override with CORS_ALLOWED_ORIGINS (exact origins) in production.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://192.168.*:*,http://10.*:*,http://172.16.*:*,http://172.17.*:*,http://172.18.*:*}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Google OAuth2 / OIDC
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Session cookie settings
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true

logging.level.com.spiramindscape=INFO
logging.level.org.springframework=INFO

# ── AI ────────────────────────────────────────────────────────────────────────
# AES-256 key (32 bytes) encoded as Base64. Set AI_ENCRYPTION_KEY in env for
# production. The default below is for local development ONLY — never use it
# in production.
ai.encryption.key=${AI_ENCRYPTION_KEY:c3BpcmEtZGV2LW9ubHkta2V5LTMyYnl0ZXMteHl6eiE=}
