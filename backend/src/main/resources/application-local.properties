spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/spira}
spring.datasource.username=${DATABASE_USERNAME:spira}
spring.datasource.password=${DATABASE_PASSWORD:spira}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Dev tooling needs GraphQL introspection (disabled by default for prod).
spring.graphql.schema.introspection.enabled=true
