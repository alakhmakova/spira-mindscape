services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spira}
      POSTGRES_USER: ${DATABASE_USERNAME:-spira}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-spira}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-spira} -d ${POSTGRES_DB:-spira}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/spira}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-spira}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-spira}
      PORT: ${PORT:-8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
      args:
        VITE_GRAPHQL_ENDPOINT: ${VITE_GRAPHQL_ENDPOINT:-/graphql}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres-data:
