server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /graphql {
        proxy_pass http://backend:8080/graphql;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REST + AI chat. The chat endpoint streams Server-Sent Events: buffering
    # must be off (tokens arrive live, not after the stream ends) and the read
    # timeout generous — the first GROW session embeds the whole coaching
    # library before the model starts answering.
    location /api {
        proxy_pass http://backend:8080/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
    }

    # Google OAuth2 Authorization Code flow — the browser is redirected to
    # /oauth2/authorization/google and back to /login/oauth2/code/google.
    location /oauth2 {
        proxy_pass http://backend:8080/oauth2;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Only the OAuth callback goes to the backend — /login itself is the SPA's
    # own sign-in page and must fall through to index.html below.
    location /login/oauth2 {
        proxy_pass http://backend:8080/login/oauth2;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
