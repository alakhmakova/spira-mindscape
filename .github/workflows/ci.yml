name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      # Supply-chain scan (OWASP A03). Policy: BLOCK on CRITICAL, REPORT HIGH.
      # The current HIGH advisories are all build tooling (vite/esbuild/tsx) that
      # never ships in the static bundle and is only fixable via a breaking vite
      # upgrade — blocking deploys on them would just get the gate disabled.
      # Criticals must always be fixed, so those still fail the build.
      - name: npm audit (block on critical)
        run: npm audit --audit-level=critical
      - name: npm audit (report high, non-blocking)
        run: npm audit --audit-level=high || true

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run backend tests
        run: |
          cd backend
          sh ./mvnw test

      - name: Backend line coverage summary
        if: always()
        run: |
          report=backend/target/site/jacoco/jacoco.csv
          if [ -f "$report" ]; then
            awk -F, 'NR>1 {miss+=$8; cov+=$9} END {if (miss+cov>0) printf "Backend line coverage: %.1f%% (%d/%d lines)\n", 100*cov/(cov+miss), cov, cov+miss}' "$report"
          else
            echo "No JaCoCo report found at $report"
          fi

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco
          if-no-files-found: warn

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports
          if-no-files-found: warn

      - name: Upload backend Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-allure-results
          path: backend/target/allure-results
          if-no-files-found: warn

  # Supply-chain scan (OWASP A03): filesystem scan of backend + frontend deps.
  # Installed via the official script (stable, no action-version drift). Policy
  # matches npm audit: BLOCK on CRITICAL, REPORT HIGH. Unfixed advisories are
  # skipped so an upstream issue with no fix can't wedge the pipeline.
  dependency-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Trivy resolves the Java dependency tree from local Maven cache. Populate
      # ~/.m2 here (cached across runs by setup-java) so Trivy never reaches out
      # to Maven Central — the shared runner IP gets 429-rate-limited there,
      # which crashed the scan as a FATAL error (not a vuln finding).
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Populate local Maven cache
        run: |
          cd backend
          sh ./mvnw -B -q dependency:go-offline

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      # --offline-scan: never issue registry/Maven-Central requests (belt-and-
      # suspenders with the warmed ~/.m2 above). npm/lockfile deps are covered
      # fully; Java deps resolve from the local cache. Policy: report HIGH,
      # block on CRITICAL.
      - name: Trivy scan — report HIGH (non-blocking)
        run: trivy fs --scanners vuln --severity HIGH --ignore-unfixed --offline-scan --exit-code 0 .

      - name: Trivy scan — block on CRITICAL
        run: trivy fs --scanners vuln --severity CRITICAL --ignore-unfixed --offline-scan --exit-code 1 .

  e2e:
    name: Python E2E tests
    needs: [backend]
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector-enabled Postgres: V13__grow_books.sql runs CREATE EXTENSION
        # vector, which the stock postgres:16 image cannot satisfy.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: spira
          POSTGRES_USER: spira
          POSTGRES_PASSWORD: spira
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build backend JAR
        run: |
          cd backend
          sh ./mvnw package -DskipTests -q

      # Start against a real PostgreSQL so Flyway migrations run end-to-end,
      # matching production. Run under the CI-only 'e2e' profile: it enables the
      # X-E2E-Auth test login (the app requires Google auth + is user-scoped) and
      # disables CSRF. Dummy OAuth creds satisfy the (unused) Google client config.
      - name: Start backend against PostgreSQL
        run: |
          # Capture stdout+stderr to a file: the process is backgrounded, so without
          # this any startup crash is invisible (the step boundary truncates console
          # output). The "Wait" step prints this log if readiness ever times out.
          java -jar backend/target/*.jar > backend.log 2>&1 &
          echo $! > backend.pid
        env:
          SPRING_PROFILES_ACTIVE: e2e
          DATABASE_URL: jdbc:postgresql://localhost:5432/spira
          DATABASE_USERNAME: spira
          DATABASE_PASSWORD: spira
          GOOGLE_CLIENT_ID: ci-e2e-dummy
          GOOGLE_CLIENT_SECRET: ci-e2e-dummy

      - name: Wait for backend to be ready
        run: |
          # The health endpoint is served at /health (HealthController @GetMapping("/health")),
          # NOT /api/health — curl -sf treats any non-2xx (e.g. a 404) as failure, so the
          # wrong path makes readiness time out even when the app is fully up.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Backend did not start in time. Last 200 lines of backend.log:"
          tail -n 200 backend.log || echo "(no backend.log found)"
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install E2E dependencies
        run: pip install -r tests-e2e/requirements.txt

      - name: Run E2E tests
        run: pytest tests-e2e/ -v --alluredir=e2e-allure-results
        env:
          SPIRA_BASE_URL: http://localhost:8080

      - name: Upload E2E Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-allure-results
          path: e2e-allure-results
          if-no-files-found: warn

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi

  allure-report:
    name: Allure report
    needs: [backend, e2e]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend Allure results
        uses: actions/download-artifact@v4.1.3
        with:
          name: backend-allure-results
          path: allure-input/backend

      - name: Download E2E Allure results
        uses: actions/download-artifact@v4.1.3
        with:
          name: e2e-allure-results
          path: allure-input/e2e

      - name: Allure Report
        uses: simple-elf/allure-report-action@53ebb757a2097edc77c53ecef4d454fc2f2f774c # v1.13
        with:
          allure_results: allure-input

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn

  # ── Continuous deployment ────────────────────────────────────────────────────
  # Builds the root Dockerfile and rolls out a new Cloud Run revision — but ONLY on
  # a push to main and ONLY after frontend, backend, and E2E tests have all passed
  # (`needs`). So a red build never ships. Authentication is keyless via Workload
  # Identity Federation: GitHub's OIDC token is exchanged for short-lived GCP
  # credentials, so there is no long-lived service-account key stored in the repo.
  # One-time GCP setup: deploy/setup-github-cd.ps1 (see docs/deploy-gcp-cloud-run.md §11).
  deploy:
    name: Deploy to Cloud Run
    needs: [frontend, backend, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required to mint the OIDC token for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Exchanges the GitHub OIDC token for GCP credentials (no key file). The
      # provider resource name and deployer SA email are non-secret repo Variables
      # set by the one-time setup script.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Build-from-source deploy (same root Dockerfile as the manual deploy). No
      # --set-env-vars / --set-secrets here on purpose: env vars and Secret Manager
      # references live on the *service* and are preserved across revisions, so this
      # never clobbers FRONTEND_URL / CORS / the secret bindings.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy spira \
            --source . \
            --region europe-west1 \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --quiet

      - name: Show deployed URL
        run: |
          gcloud run services describe spira \
            --region europe-west1 \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --format="value(status.url)"
